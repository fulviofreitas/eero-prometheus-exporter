# ============================================================================
# 🧪 Continuous Integration Pipeline
# ============================================================================
# Chain: Commit Lint → Lint & Format → [Type Check ‖ Security ‖ Tests ‖ Docker] → CI Success
#
# All reusable actions are sourced from fulviofreitas/eero-client/.github/actions/
# ============================================================================

name: 🧪 CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================================
  # 1️⃣ Commit Lint (Gate 1)
  # ============================================================================
  commitlint:
    name: 📝 Commit Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Validate commits
        uses: fulviofreitas/eero-client/.github/actions/commitlint@master
        with:
          from-sha: ${{ github.event.pull_request.base.sha }}
          to-sha: ${{ github.event.pull_request.head.sha }}

  # ============================================================================
  # 2️⃣ Lint & Format (Gate 2 - depends on Commit Lint)
  # ============================================================================
  lint:
    name: 🧹 Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: commitlint

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 🧹 Run Ruff linter
        run: ruff check src/ --output-format=github

      - name: 🔍 Run Ruff formatter check
        run: ruff format --check src/ --diff

  # ============================================================================
  # 3️⃣ Type Check (Parallel - depends on Lint)
  # ============================================================================
  type-check:
    name: 🔍 Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 🔎 Run MyPy type checker
        uses: fulviofreitas/eero-client/.github/actions/python-typecheck@master
        with:
          src-path: "src/eero_exporter/"
          fail-on-error: "true"
          use-uv: "false"

  # ============================================================================
  # 3️⃣ Security Scan (Parallel - depends on Lint)
  # ============================================================================
  security:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: 🛡️ Run security scan
        uses: fulviofreitas/eero-client/.github/actions/security-bandit@master
        with:
          src-path: "src/"
          fail-on-findings: "true"
          use-uv: "false"

  # ============================================================================
  # 3️⃣ Test Matrix (Parallel - depends on Lint)
  # ============================================================================
  test:
    name: 🧪 Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 🧪 Run tests with coverage
        run: |
          if [ -d "tests" ] && find tests -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
            pytest --cov=src/eero_exporter --cov-report=xml --cov-report=term-missing -v
          else
            echo "⚠️ No tests found - skipping test execution"
            echo "::warning::No test files found in tests/ directory"
          fi

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12' && hashFiles('coverage.xml') != ''
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ============================================================================
  # 3️⃣ Docker Build Test (Parallel - depends on Lint)
  # ============================================================================
  docker-build:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: eero-prometheus-exporter:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # 4️⃣ CI Success Gate (Final - depends on all parallel jobs)
  # ============================================================================
  ci-success:
    name: ✅ CI Success
    runs-on: ubuntu-latest
    needs: [commitlint, lint, type-check, test, security, docker-build]
    if: always()

    steps:
      - name: 🔍 Check all jobs passed
        run: |
          COMMITLINT="${{ needs.commitlint.result }}"
          LINT="${{ needs.lint.result }}"
          TYPECHECK="${{ needs.type-check.result }}"
          TEST="${{ needs.test.result }}"
          SECURITY="${{ needs.security.result }}"
          DOCKER="${{ needs.docker-build.result }}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🧪 CI Pipeline Summary

          | Stage | Job | Status |
          |:------|:----|:-------|
          | 1️⃣ | 📝 Commit Lint | ${COMMITLINT} |
          | 2️⃣ | 🧹 Lint & Format | ${LINT} |
          | 3️⃣ | 🔍 Type Check | ${TYPECHECK} |
          | 3️⃣ | 🛡️ Security | ${SECURITY} |
          | 3️⃣ | 🧪 Tests | ${TEST} |
          | 3️⃣ | 🐳 Docker Build | ${DOCKER} |

          EOF

          # All jobs are required to pass
          if [[ "$COMMITLINT" == "success" && "$LINT" == "success" && "$TYPECHECK" == "success" && "$TEST" == "success" && "$SECURITY" == "success" && "$DOCKER" == "success" ]]; then
            cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          > [!NOTE]
          > ### ✅ All Required Checks Passed
          > CI pipeline completed successfully. Ready for release!

          ---

          ```
          1️⃣ 📝 Commit Lint
                 ↓
          2️⃣ 🧹 Lint & Format
                 ↓
               ┌─┴─┬─────┬─────────┐
          3️⃣   │   │     │         │
          🔍 Type 🛡️ Sec 🧪 Test 🐳 Docker
               └─┬─┴─────┴─────────┘
                 ↓
          4️⃣ ✅ CI Success → 🚀 Release
          ```

          EOF
            exit 0
          else
            cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          > [!CAUTION]
          > ### ❌ Some Required Checks Failed
          > Review the failed jobs above and fix any issues before merging.

          EOF
            exit 1
          fi
